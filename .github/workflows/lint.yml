name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skills and templates
        run: python3 scripts/lint-skills.py
